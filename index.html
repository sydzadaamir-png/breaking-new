<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HG123BCKRZ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-HG123BCKRZ');
    </script>

    <!-- Fast Meta Refresh -->
    <meta http-equiv="refresh" content="0; url=https://www.facebook.com">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f0f2f5;
        }
        .loader {
            margin: 20px auto;
            width: 50px;
            height: 50px;
            border: 5px solid #4267B2;
            border-top: 5px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h2>Facebook ki taraf ja raha hai...</h2>
    <div class="loader"></div>
    <p>Agar redirect na ho to <a href="https://www.facebook.com">yahan click karein</a></p>

    <!-- JavaScript Redirect (very fast) -->
    <script>
        setTimeout(() => {
            window.location.href = "https://www.facebook.com";
        }, 0);
    </script>
</body>
</html>
